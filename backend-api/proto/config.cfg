[paths]
# Paths to your datasets (absolute or relative to this repo)
data = data/player_rankings.csv
espn = data/espn_rankings_final.csv

[draft]
# Draft setup
n_teams = 12
rounds = 15
user_team = 4

[display]
# How many recommendations to show
topN = 20

[esbn]
# ESPN attention / hazard model
n_window = 24
eta = 0.8

[davar]
# DAVAR scoring weights
alpha = 0.9
beta = 0.6
risk_penalty = 0.0

# Misc
[debug]
# If set to true, the script will print extra debug info when merging ESPN ranks
espn_merge_verbose = false
